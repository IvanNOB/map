# Render.com Blueprint - deploy automático
services:
  - type: web
    name: agencia-domicilios
    runtime: node
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-terra
      - key: ASSISTANT_RATE_LIMIT_MAX
        value: "10"
