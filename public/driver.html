<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d4af37">
  <link rel="manifest" href="/manifest-driver.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Repartidor - Servicio Ghost</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo-wrap"><span class="brand-logo">👻</span></div>
      <h1>Servicio Ghost</h1>
      <p>App del Repartidor</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Correo electronico</label>
          <input type="email" id="login-email" placeholder="repartidor@agencia.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contrasena</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesion</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Main App (hidden until login) -->
  <div id="app" class="app-container hidden">
    <!-- Header -->
    <header class="driver-header">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span class="brand-logo" style="font-size:1.2rem;">👻</span>
        <h2 id="driver-name" style="margin:0;font-size:1rem;">Repartidor</h2>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span style="font-size:0.75rem;color:var(--text-muted);" id="status-label">Desconectado</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-online">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div style="display:flex;align-items:center;gap:0.3rem;">
        <button id="btn-refresh-driver" class="icon-btn" title="Refrescar pedidos">🔄</button>
        <button id="btn-theme" class="icon-btn" title="Cambiar tema">🌙</button>
        <button id="btn-logout" class="btn btn-outline btn-sm">Salir</button>
      </div>
    </header>

    <!-- Earnings -->
    <div class="earnings-card">
      <div>
        <div class="e-label">💰 Ganancia de hoy</div>
        <div class="e-value" id="earn-today">$0</div>
      </div>
      <div class="e-sub">
        <div id="earn-deliveries">0 entregas</div>
        <div id="earn-pct"></div>
      </div>
    </div>

    <!-- Location Section (compact, arriba del mapa) -->
    <section class="driver-section" style="padding:0.6rem 1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
        <label class="consent-check" style="margin:0;font-size:0.8rem;">
          <input type="checkbox" id="consent-location">
          Compartir ubicacion
        </label>
        <div style="display:flex;gap:0.4rem;">
          <button id="btn-share-location" class="btn btn-primary btn-sm" disabled>📍 Iniciar</button>
          <button id="btn-stop-location" class="btn btn-danger btn-sm hidden">⏹ Detener</button>
        </div>
      </div>
      <div id="gps-readout" class="gps-readout" style="font-size:0.7rem;margin-top:0.4rem;">
        Lat: -- | Lng: -- | Velocidad: -- | Precision: -- | Ultima actualizacion: --
      </div>
      <div id="bg-status" class="bg-status hidden"></div>
    </section>

    <!-- Map -->
    <section class="driver-section" style="padding:0;">
      <div id="driver-map" class="map-container-mini" style="height:200px;border-radius:10px;margin:0 0.5rem;"></div>
    </section>

    <!-- Orders Section -->
    <section class="driver-section">
      <h3 style="display:flex;align-items:center;gap:0.4rem;font-size:0.95rem;">📦 Mis Pedidos</h3>
      <div id="driver-orders"></div>
    </section>

    <!-- Chat with dispatch -->
    <section class="driver-section">
      <h3 style="font-size:0.95rem;">💬 Chat con Despacho</h3>
      <div class="driver-chat">
        <div class="chat-messages" id="dchat-messages">
          <div class="chat-empty">Escribe a tu central de despacho</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="dchat-input" placeholder="Escribe un mensaje...">
          <button class="btn btn-primary btn-sm" id="dchat-send">Enviar</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/driver.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
