<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repartidor - Agencia de Domicilios</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>Agencia de Domicilios</h1>
      <p>App del Repartidor</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Correo electronico</label>
          <input type="email" id="login-email" placeholder="repartidor@agencia.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contrasena</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar Sesion</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Main App (hidden until login) -->
  <div id="app" class="app-container hidden">
    <!-- Header -->
    <header class="driver-header">
      <h2 id="driver-name">Repartidor</h2>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span style="font-size:0.8rem;color:var(--text-muted);" id="status-label">Desconectado</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-online">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button id="btn-logout" class="btn btn-outline btn-sm">Cerrar Sesion</button>
    </header>

    <!-- Orders Section -->
    <section class="driver-section">
      <h3>Mis Pedidos</h3>
      <div id="driver-orders"></div>
    </section>

    <!-- Location Section -->
    <section class="driver-section">
      <h3>Mi Ubicacion</h3>
      <div class="location-controls">
        <label class="consent-check">
          <input type="checkbox" id="consent-location">
          Acepto compartir mi ubicacion en tiempo real
        </label>
      </div>
      <div class="location-controls">
        <button id="btn-share-location" class="btn btn-primary btn-sm" disabled>Compartir Ubicacion</button>
        <button id="btn-stop-location" class="btn btn-danger btn-sm hidden">Dejar de Compartir</button>
      </div>
      <div id="gps-readout" class="gps-readout">
        Lat: -- | Lng: -- | Velocidad: -- | Precision: -- | Ultima actualizacion: --
      </div>
      <div id="driver-map" class="map-container-mini"></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/driver.js"></script>
</body>
</html>
