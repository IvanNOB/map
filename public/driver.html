<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#d4af37">
  <link rel="manifest" href="/manifest-driver.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Repartidor - Servicio Ghost</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/driver-rappi.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <!-- Login -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo-wrap"><span class="brand-logo">👻</span></div>
      <h1>Servicio Ghost</h1>
      <p>App del Repartidor</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Correo</label>
          <input type="email" id="login-email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contrasena</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app-container hidden">

    <!-- 1. Header -->
    <header class="drv-header">
      <div class="drv-name">
        <span>👻</span>
        <span id="driver-name">Ghost</span>
        <span id="sync-dot" class="sync-dot"></span>
      </div>
      <div class="drv-actions">
        <div class="online-toggle" id="online-toggle">
          <span class="ot-dot"></span>
          <span class="ot-text" id="status-label">OFFLINE</span>
          <input type="checkbox" id="toggle-online" hidden>
        </div>
        <div class="drv-settings">
          <button class="icon-btn" id="btn-settings" title="Ajustes">⚙️</button>
          <div class="drv-settings-menu" id="settings-menu">
            <button id="btn-theme">🌙 Tema</button>
            <button id="btn-refresh-driver">🔄 Refrescar</button>
            <button id="btn-logout">🚪 Salir</button>
          </div>
        </div>
      </div>
    </header>

    <!-- 2. Mapa (prioridad maxima) -->
    <section class="drv-map-section">
      <div id="driver-map"></div>
      <div class="gps-overlay">
        <div class="gps-info">
          <div class="gps-speed" id="gps-speed">0 km/h</div>
          <div class="gps-detail" id="gps-readout">Toca para activar GPS</div>
        </div>
        <button id="btn-share-location" class="gps-btn gps-btn-start">▶ GPS</button>
        <button id="btn-stop-location" class="gps-btn gps-btn-stop hidden">⏹ STOP</button>
      </div>
      <input type="checkbox" id="consent-location" checked hidden>
    </section>

    <!-- 3. Stats -->
    <div class="drv-stats">
      <div class="drv-stat">
        <div class="val" id="earn-today">$0</div>
        <div class="lbl">Ganancia</div>
      </div>
      <div class="drv-stat">
        <div class="val" id="earn-deliveries">0</div>
        <div class="lbl">Entregas</div>
      </div>
      <div class="drv-stat">
        <div class="val" id="earn-pct">0%</div>
        <div class="lbl">Comision</div>
      </div>
      <div class="drv-stat">
        <div class="val" id="stat-active-orders">0</div>
        <div class="lbl">Activos</div>
      </div>
    </div>

    <!-- 4. Tabs + Contenido -->
    <div class="drv-bottom">
      <div class="drv-tabs">
        <button class="drv-tab active" data-panel="panel-pedidos">📦 Pedidos</button>
        <button class="drv-tab" data-panel="panel-chat">💬 Chat <span class="tab-badge" id="chat-badge">0</span></button>
      </div>
      <div id="panel-pedidos" class="drv-panel">
        <div id="driver-orders"></div>
      </div>
      <div id="panel-chat" class="drv-panel hidden">
        <div class="drv-chat-wrap">
          <div class="chat-messages" id="dchat-messages">
            <div class="chat-empty">Escribe a tu central</div>
          </div>
          <div class="chat-quick-replies">
            <button class="chat-quick-btn" data-msg="Llegue al punto">📍 Llegue</button>
            <button class="chat-quick-btn" data-msg="Esperando al cliente">⏳ Esperando</button>
            <button class="chat-quick-btn" data-msg="Tengo un problema">⚠️ Problema</button>
            <button class="chat-quick-btn" data-msg="Entrega completada">✅ Entregado</button>
            <button class="chat-quick-btn" data-msg="Estoy en camino">🛵 En camino</button>
          </div>
          <div class="chat-input-row">
            <input type="text" id="dchat-input" placeholder="Mensaje...">
            <button class="btn btn-primary" id="dchat-send">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/driver.js"></script>
  <script src="/js/pwa.js"></script>
  <script>
    // Tabs
    document.querySelectorAll('.drv-tab').forEach(function(t){
      t.addEventListener('click',function(){
        document.querySelectorAll('.drv-tab').forEach(function(b){b.classList.remove('active');});
        t.classList.add('active');
        var p=t.getAttribute('data-panel');
        document.querySelectorAll('.drv-panel').forEach(function(x){x.classList.add('hidden');});
        document.getElementById(p).classList.remove('hidden');
        if(p==='panel-chat'){var b=document.getElementById('chat-badge');if(b){b.classList.remove('show');b.textContent='0';}}
      });
    });
    // Online toggle
    var ot=document.getElementById('online-toggle'),cb=document.getElementById('toggle-online');
    if(ot)ot.addEventListener('click',function(){
      cb.checked=!cb.checked;cb.dispatchEvent(new Event('change'));
      if(cb.checked){ot.classList.add('active');document.getElementById('status-label').textContent='EN LINEA';}
      else{ot.classList.remove('active');document.getElementById('status-label').textContent='OFFLINE';}
    });
    // Settings
    var bs=document.getElementById('btn-settings'),sm=document.getElementById('settings-menu');
    if(bs){bs.addEventListener('click',function(e){e.stopPropagation();sm.classList.toggle('show');});document.addEventListener('click',function(){sm.classList.remove('show');});}
    // Quick replies
    document.querySelectorAll('.chat-quick-btn').forEach(function(b){b.addEventListener('click',function(){var i=document.getElementById('dchat-input');i.value=b.getAttribute('data-msg');document.getElementById('dchat-send').click();});});
    // GPS auto
    localStorage.setItem('gps_consent','true');
    var c=document.getElementById('consent-location');if(c)c.checked=true;
    var g=document.getElementById('btn-share-location');if(g)g.disabled=false;
  </script>
</body>
</html>
