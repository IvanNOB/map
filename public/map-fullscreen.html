<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa - Agencia de Domicilios</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #0f1117; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
  (function () {
    'use strict';

    var token = localStorage.getItem('token') || '';
    if (!token) { document.body.innerHTML = '<p style="color:#fff;padding:2rem;">No autenticado. Inicia sesion en el panel principal.</p>'; return; }

    var map = L.map('map').setView([4.6097, -74.0817], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    var driverMarkers = {};

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Load drivers and orders
    function apiHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    }

    async function loadDrivers() {
      try {
        var res = await fetch('/api/drivers', { headers: apiHeaders() });
        if (res.status === 401) { document.body.innerHTML = '<p style="color:#fff;padding:2rem;">Sesion expirada. Inicia sesion de nuevo.</p>'; return; }
        if (res.ok) {
          var drivers = await res.json();
          drivers.forEach(function (d) {
            if (d.lat && d.lng && d.status !== 'offline') {
              addDriverMarker(d);
            }
          });
        }
      } catch (e) {}
    }

    async function loadOrders() {
      try {
        var res = await fetch('/api/orders?limit=100', { headers: apiHeaders() });
        if (res.ok) {
          var data = await res.json();
          var orders = data.orders || data;
          orders.forEach(function (o) {
            if (['assigned','picked_up','on_the_way'].includes(o.status)) {
              if (o.pickup_lat && o.pickup_lng) {
                L.circleMarker([o.pickup_lat, o.pickup_lng], { radius: 6, color: '#3b82f6', fillOpacity: 0.8 })
                  .bindPopup('Recogida: ' + escapeHtml(o.pickup_address || o.code))
                  .addTo(map);
              }
              if (o.dropoff_lat && o.dropoff_lng) {
                L.circleMarker([o.dropoff_lat, o.dropoff_lng], { radius: 6, color: '#ef4444', fillOpacity: 0.8 })
                  .bindPopup('Entrega: ' + escapeHtml(o.dropoff_address || o.code))
                  .addTo(map);
              }
            }
          });
        }
      } catch (e) {}
    }

    function addDriverMarker(d) {
      if (!d.lat || !d.lng) return;
      var marker = L.circleMarker([d.lat, d.lng], {
        radius: 10, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.8,
      }).bindPopup('<strong>' + escapeHtml(d.name) + '</strong><br>Vehiculo: ' + escapeHtml(d.vehicle || '-') + '<br>Velocidad: ' + (d.speed || 0) + ' km/h');
      marker.addTo(map);
      driverMarkers[d.id] = marker;
    }

    // Socket.IO for real-time updates
    var socket = io({ auth: { token: token } });

    socket.on('driver:location', function (data) {
      if (driverMarkers[data.id]) {
        driverMarkers[data.id].setLatLng([data.lat, data.lng]);
        driverMarkers[data.id].setPopupContent('<strong>' + escapeHtml(data.name) + '</strong><br>Velocidad: ' + (data.speed || 0) + ' km/h');
      } else {
        var marker = L.circleMarker([data.lat, data.lng], {
          radius: 10, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.8,
        }).bindPopup('<strong>' + escapeHtml(data.name) + '</strong><br>Velocidad: ' + (data.speed || 0) + ' km/h');
        marker.addTo(map);
        driverMarkers[data.id] = marker;
      }
    });

    socket.on('driver:offline', function (data) {
      if (driverMarkers[data.id]) {
        map.removeLayer(driverMarkers[data.id]);
        delete driverMarkers[data.id];
      }
    });

    loadDrivers();
    loadOrders();

    // Refresh orders every 30s
    setInterval(loadOrders, 30000);
  })();
  </script>
</body>
</html>
