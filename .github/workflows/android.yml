name: Compilar APK del Repartidor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "public/apk/version.json"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias
        working-directory: mobile
        run: npm install

      - name: Crear plataforma Android
        working-directory: mobile
        run: npx cap add android

      - name: Sincronizar Capacitor (genera MainActivity.java)
        working-directory: mobile
        run: npx cap sync android

      - name: Generar iconos y splash
        working-directory: mobile
        run: npx @capacitor/assets generate --android || true

      - name: Agregar permisos al AndroidManifest
        working-directory: mobile
        run: node patch-manifest.mjs

      - name: Habilitar microfono en WebView (MainActivity)
        working-directory: mobile
        run: node patch-webview-permissions.mjs

      - name: Segunda sincronizacion (aplica cambios del MainActivity)
        working-directory: mobile
        run: npx cap sync android

      - name: Compilar APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: repartidor-domicilios-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Leer version de version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('public/apk/version.json')); print(d['version'])")
          NOTES=$(python3 -c "import json; d=json.load(open('public/apk/version.json')); print(d['releaseNotes'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Renombrar APK para el release
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk repartidor.apk

      - name: Crear Release en GitHub con el APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }} - Repartidor Domicilios"
          body: |
            ## Repartidor Domicilios v${{ steps.version.outputs.version }}

            ${{ steps.version.outputs.notes }}

            ### Como instalar:
            1. Descarga **repartidor.apk** de abajo ⬇️
            2. Abre el archivo en tu celular
            3. Si aparece aviso de seguridad → toca **"Instalar de todas formas"**
            4. Se instala encima de la version anterior (no pierdes datos)
          files: repartidor.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
