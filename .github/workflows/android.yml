name: Compilar APK del Repartidor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "public/apk/version.json"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Instalar dependencias npm
        working-directory: mobile
        run: npm install

      - name: Crear plataforma Android
        working-directory: mobile
        run: npx cap add android

      - name: Sincronizar Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Agregar permisos al AndroidManifest
        working-directory: mobile
        run: node patch-manifest.mjs

      - name: Solicitar permiso microfono en MainActivity
        working-directory: mobile
        run: node patch-webview-permissions.mjs

      - name: Compilar APK debug
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -q

      - name: Verificar que el APK existe
        run: ls -lh mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: repartidor-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Leer version
        id: ver
        run: |
          echo "version=$(python3 -c "import json; print(json.load(open('public/apk/version.json'))['version'])")" >> $GITHUB_OUTPUT
          echo "notes=$(python3 -c "import json; print(json.load(open('public/apk/version.json'))['releaseNotes'])")" >> $GITHUB_OUTPUT

      - name: Copiar APK como repartidor.apk
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk repartidor.apk

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "v${{ steps.ver.outputs.version }} - Repartidor Domicilios"
          body: |
            ## Repartidor Domicilios v${{ steps.ver.outputs.version }}

            ${{ steps.ver.outputs.notes }}

            ---
            **Como instalar:**
            1. Descarga **repartidor.apk** ⬇️
            2. Abrelo en tu celular Android
            3. Si pide permiso para instalar apps → **Permitir**
            4. Se instala sobre la version anterior (no perdes datos)
          files: repartidor.apk
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
