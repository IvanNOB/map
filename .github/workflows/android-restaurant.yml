name: Compilar APK del Restaurante

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile-restaurant/**"
      - ".github/workflows/android-restaurant.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias
        working-directory: mobile-restaurant
        run: npm install

      - name: Crear plataforma Android
        working-directory: mobile-restaurant
        run: npx cap add android

      - name: Generar iconos (fantasma) y splash
        working-directory: mobile-restaurant
        run: npx @capacitor/assets generate --android || true

      - name: Sincronizar Capacitor
        working-directory: mobile-restaurant
        run: npx cap sync android

      - name: Compilar APK (debug)
        working-directory: mobile-restaurant/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: ghost-restaurante-apk
          path: mobile-restaurant/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
