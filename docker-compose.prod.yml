# ─── Docker Compose - Producción Override ─────────────────────────────────────
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requiere: archivo .env con JWT_SECRET y CORS_ORIGIN definidos.

services:
  app:
    container_name: agencia-domicilios-prod
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
